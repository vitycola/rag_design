<svg viewBox="0 0 760 500" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, -apple-system, sans-serif">
  <title>rag_design architecture</title>
  <desc>RAG pipeline: ingest path on top-left, query path on bottom-left, shared components on right.</desc>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8c959f"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0969da"/>
    </marker>
  </defs>

  <rect width="760" height="500" fill="#ffffff" rx="12"/>

  <!-- Ingest section -->
  <rect x="16" y="20" width="376" height="108" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
  <text x="28" y="36" fill="#57606a" font-size="9" font-weight="700" letter-spacing="1.2">INGEST PATH</text>

  <!-- Query section -->
  <rect x="16" y="280" width="376" height="108" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
  <text x="28" y="296" fill="#57606a" font-size="9" font-weight="700" letter-spacing="1.2">QUERY PATH</text>

  <!-- Shared section -->
  <rect x="408" y="20" width="336" height="460" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
  <text x="420" y="36" fill="#57606a" font-size="9" font-weight="700" letter-spacing="1.2">SHARED</text>

  <!-- Documents -->
  <rect x="28" y="42" width="100" height="72" rx="6" fill="#fff" stroke="#0969da" stroke-width="1.5"/>
  <text x="78" y="64" fill="#0969da" font-size="11" font-weight="700" text-anchor="middle">Documents</text>
  <text x="78" y="80" fill="#57606a" font-size="9" text-anchor="middle">PDF · MD · URL</text>
  <text x="78" y="96" fill="#8c959f" font-size="8" text-anchor="middle">pymupdf4llm · httpx</text>
  <line x1="128" y1="78" x2="146" y2="78" stroke="#8c959f" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Chunking -->
  <rect x="146" y="42" width="100" height="72" rx="6" fill="#fff" stroke="#0969da" stroke-width="1.5"/>
  <text x="196" y="64" fill="#0969da" font-size="11" font-weight="700" text-anchor="middle">Chunking</text>
  <text x="196" y="80" fill="#57606a" font-size="9" text-anchor="middle">Semantic · Fixed</text>
  <text x="196" y="96" fill="#8c959f" font-size="8" text-anchor="middle">sentence-transformers</text>
  <line x1="246" y1="78" x2="264" y2="78" stroke="#8c959f" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Ingest Embedder -->
  <rect x="264" y="42" width="100" height="72" rx="6" fill="#fff" stroke="#0969da" stroke-width="1.5"/>
  <text x="314" y="64" fill="#0969da" font-size="11" font-weight="700" text-anchor="middle">Embedder</text>
  <text x="314" y="80" fill="#57606a" font-size="9" text-anchor="middle">Voyage AI</text>
  <text x="314" y="96" fill="#8c959f" font-size="8" text-anchor="middle">+ local fallback</text>

  <!-- Ingest Embedder → Vector Store -->
  <polyline points="364,78 392,78 392,162 420,162" fill="none" stroke="#0969da" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- Query boxes -->
  <rect x="28" y="300" width="100" height="72" rx="6" fill="#fff" stroke="#1a7f37" stroke-width="1.5"/>
  <text x="78" y="322" fill="#1a7f37" font-size="11" font-weight="700" text-anchor="middle">Query</text>
  <text x="78" y="338" fill="#57606a" font-size="9" text-anchor="middle">CLI · MCP (future)</text>
  <text x="78" y="354" fill="#8c959f" font-size="8" text-anchor="middle">rag query "..."</text>
  <line x1="128" y1="336" x2="146" y2="336" stroke="#8c959f" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="146" y="300" width="100" height="72" rx="6" fill="#fff" stroke="#1a7f37" stroke-width="1.5"/>
  <text x="196" y="322" fill="#1a7f37" font-size="11" font-weight="700" text-anchor="middle">Embedder</text>
  <text x="196" y="338" fill="#57606a" font-size="9" text-anchor="middle">same provider</text>
  <text x="196" y="354" fill="#8c959f" font-size="8" text-anchor="middle">factories.py</text>
  <line x1="246" y1="336" x2="264" y2="336" stroke="#8c959f" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="264" y="300" width="100" height="72" rx="6" fill="#fff" stroke="#1a7f37" stroke-width="1.5"/>
  <text x="314" y="322" fill="#1a7f37" font-size="11" font-weight="700" text-anchor="middle">Retrieval</text>
  <text x="314" y="338" fill="#57606a" font-size="9" text-anchor="middle">top-k · threshold</text>
  <text x="314" y="354" fill="#8c959f" font-size="8" text-anchor="middle">metadata filter</text>

  <!-- Retrieval → Vector Store -->
  <polyline points="364,336 392,336 392,186 420,186" fill="none" stroke="#1a7f37" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Config -->
  <rect x="420" y="44" width="312" height="58" rx="6" fill="#fff" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="576" y="66" fill="#24292f" font-size="11" font-weight="700" text-anchor="middle">Config</text>
  <text x="576" y="82" fill="#57606a" font-size="9" text-anchor="middle">pydantic-settings · EMBEDDER=voyage|local · TOP_K</text>
  <text x="576" y="96" fill="#8c959f" font-size="8" text-anchor="middle">.env · get_settings() singleton</text>

  <!-- Config → Vector Store -->
  <line x1="576" y1="102" x2="576" y2="120" stroke="#8c959f" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Config → Generation (dashed right side) -->
  <polyline points="730,102 730,310" fill="none" stroke="#8c959f" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="730" y1="310" x2="732" y2="310" stroke="#8c959f" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Vector Store -->
  <rect x="420" y="120" width="312" height="110" rx="6" fill="#ddf4ff" stroke="#0969da" stroke-width="2"/>
  <text x="576" y="146" fill="#0969da" font-size="12" font-weight="700" text-anchor="middle">Vector Store</text>
  <text x="576" y="162" fill="#57606a" font-size="10" text-anchor="middle">ChromaDB (embedded)</text>
  <rect x="436" y="170" width="280" height="48" rx="4" fill="#fff" stroke="#d0d7de" stroke-width="1"/>
  <text x="576" y="188" fill="#8c959f" font-size="8.5" text-anchor="middle">collection: {embedder}_{doc_hash}</text>
  <text x="576" y="204" fill="#57606a" font-size="9" text-anchor="middle">chunk_id · source · page · section · VectorStore ABC</text>

  <!-- Vector Store → Generation -->
  <line x1="576" y1="230" x2="576" y2="260" stroke="#8c959f" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="590" y="248" fill="#8c959f" font-size="8">chunks</text>

  <!-- Generation -->
  <rect x="420" y="260" width="312" height="66" rx="6" fill="#d1f0d1" stroke="#1a7f37" stroke-width="1.5"/>
  <text x="576" y="283" fill="#1a7f37" font-size="12" font-weight="700" text-anchor="middle">Generation</text>
  <text x="576" y="299" fill="#57606a" font-size="9" text-anchor="middle">claude-sonnet-4-5 · prompt caching · grounded citations</text>
  <text x="576" y="314" fill="#8c959f" font-size="8" text-anchor="middle">Anthropic SDK direct — no LangChain</text>

  <!-- Generation → Evaluation -->
  <line x1="576" y1="326" x2="576" y2="356" stroke="#8c959f" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="590" y="344" fill="#8c959f" font-size="8">answers</text>

  <!-- Evaluation -->
  <rect x="420" y="356" width="312" height="66" rx="6" fill="#fff8c5" stroke="#9a6700" stroke-width="1.5"/>
  <text x="576" y="379" fill="#7d4e00" font-size="12" font-weight="700" text-anchor="middle">Evaluation (RAGAS)</text>
  <text x="576" y="395" fill="#57606a" font-size="9" text-anchor="middle">Faithfulness · Answer Relevancy</text>
  <text x="576" y="411" fill="#57606a" font-size="9" text-anchor="middle">Context Precision · Context Recall</text>

  <!-- Golden set input -->
  <line x1="420" y1="389" x2="400" y2="389" stroke="#9a6700" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arr)"/>
  <text x="318" y="393" fill="#9a6700" font-size="8" text-anchor="middle">golden Q&amp;A set</text>

  <!-- Legend -->
  <rect x="16" y="430" width="376" height="54" rx="6" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
  <text x="28" y="447" fill="#57606a" font-size="9" font-weight="700" letter-spacing="1">LEGEND</text>
  <rect x="28" y="453" width="12" height="12" rx="2" fill="#fff" stroke="#0969da" stroke-width="1.5"/>
  <text x="46" y="464" fill="#24292f" font-size="9">Ingest path</text>
  <rect x="130" y="453" width="12" height="12" rx="2" fill="#fff" stroke="#1a7f37" stroke-width="1.5"/>
  <text x="148" y="464" fill="#24292f" font-size="9">Query path</text>
  <rect x="232" y="453" width="12" height="12" rx="2" fill="#ddf4ff" stroke="#0969da" stroke-width="1.5"/>
  <text x="250" y="464" fill="#24292f" font-size="9">Vector Store (shared)</text>
  <rect x="28" y="469" width="12" height="12" rx="2" fill="#d1f0d1" stroke="#1a7f37" stroke-width="1.5"/>
  <text x="46" y="480" fill="#24292f" font-size="9">Generation</text>
  <rect x="130" y="469" width="12" height="12" rx="2" fill="#fff8c5" stroke="#9a6700" stroke-width="1.5"/>
  <text x="148" y="480" fill="#24292f" font-size="9">Evaluation (RAGAS)</text>
  <line x1="252" y1="475" x2="272" y2="475" stroke="#8c959f" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arr)"/>
  <text x="278" y="479" fill="#24292f" font-size="9">config dependency</text>
</svg>
