<svg viewBox="0 0 720 500" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, sans-serif" style="background:#0d1117">
  <title>rag_design architecture</title>
  <desc>Data flow diagram of the RAG pipeline: documents flow through ingestion, chunking, embeddings, and vector store during ingest; queries flow through embeddings, retrieval, generation to produce answers.</desc>

  <rect width="720" height="500" fill="#0d1117" rx="12"/>

  <!-- INGEST PATH label -->
  <text x="36" y="38" fill="#6e7681" font-size="11" font-weight="600" letter-spacing="1.5">INGEST PATH</text>
  <line x1="36" y1="44" x2="340" y2="44" stroke="#6e7681" stroke-width="1" opacity="0.4"/>

  <!-- QUERY PATH label -->
  <text x="36" y="290" fill="#6e7681" font-size="11" font-weight="600" letter-spacing="1.5">QUERY PATH</text>
  <line x1="36" y1="296" x2="340" y2="296" stroke="#6e7681" stroke-width="1" opacity="0.4"/>

  <!-- SHARED label -->
  <text x="420" y="38" fill="#6e7681" font-size="11" font-weight="600" letter-spacing="1.5">SHARED</text>
  <line x1="420" y1="44" x2="684" y2="44" stroke="#6e7681" stroke-width="1" opacity="0.4"/>

  <!-- Documents -->
  <rect x="36" y="60" width="110" height="68" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="91" y="85" fill="#58a6ff" font-size="12" font-weight="600" text-anchor="middle">Documents</text>
  <text x="91" y="102" fill="#8b949e" font-size="10" text-anchor="middle">PDF · MD · URL</text>
  <text x="91" y="118" fill="#6e7681" font-size="9" text-anchor="middle">pymupdf4llm · httpx</text>
  <line x1="146" y1="94" x2="168" y2="94" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Chunking -->
  <rect x="168" y="60" width="110" height="68" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="223" y="85" fill="#58a6ff" font-size="12" font-weight="600" text-anchor="middle">Chunking</text>
  <text x="223" y="102" fill="#8b949e" font-size="10" text-anchor="middle">Semantic · Fixed</text>
  <text x="223" y="118" fill="#6e7681" font-size="9" text-anchor="middle">sentence-transformers</text>
  <line x1="278" y1="94" x2="300" y2="94" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Ingest Embedder -->
  <rect x="300" y="60" width="110" height="68" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="355" y="85" fill="#58a6ff" font-size="12" font-weight="600" text-anchor="middle">Embedder</text>
  <text x="355" y="102" fill="#8b949e" font-size="10" text-anchor="middle">Voyage AI</text>
  <text x="355" y="118" fill="#6e7681" font-size="9" text-anchor="middle">+ local fallback</text>
  <line x1="355" y1="128" x2="355" y2="155" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="355" y1="128" x2="552" y2="128" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="552" y1="128" x2="552" y2="155" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Vector Store -->
  <rect x="420" y="155" width="264" height="130" rx="8" fill="#0f1b2d" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="552" y="182" fill="#1f6feb" font-size="12" font-weight="700" text-anchor="middle">Vector Store</text>
  <text x="552" y="200" fill="#8b949e" font-size="10" text-anchor="middle">ChromaDB (embedded)</text>
  <rect x="440" y="210" width="224" height="58" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="552" y="230" fill="#6e7681" font-size="9" text-anchor="middle">collection: {embedder}_{doc_hash}</text>
  <text x="552" y="246" fill="#8b949e" font-size="10" text-anchor="middle">chunk_id · source · page · section</text>
  <text x="552" y="260" fill="#6e7681" font-size="9" text-anchor="middle">VectorStore ABC → Qdrant-ready</text>

  <!-- Query -->
  <rect x="36" y="312" width="110" height="68" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="91" y="337" fill="#3fb950" font-size="12" font-weight="600" text-anchor="middle">Query</text>
  <text x="91" y="354" fill="#8b949e" font-size="10" text-anchor="middle">CLI · MCP (future)</text>
  <text x="91" y="370" fill="#6e7681" font-size="9" text-anchor="middle">rag query "..."</text>
  <line x1="146" y1="346" x2="168" y2="346" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Query Embedder -->
  <rect x="168" y="312" width="110" height="68" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="223" y="337" fill="#3fb950" font-size="12" font-weight="600" text-anchor="middle">Embedder</text>
  <text x="223" y="354" fill="#8b949e" font-size="10" text-anchor="middle">same provider</text>
  <text x="223" y="370" fill="#6e7681" font-size="9" text-anchor="middle">factories.py</text>
  <line x1="278" y1="346" x2="300" y2="346" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Retrieval -->
  <rect x="300" y="312" width="110" height="68" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="355" y="337" fill="#3fb950" font-size="12" font-weight="600" text-anchor="middle">Retrieval</text>
  <text x="355" y="354" fill="#8b949e" font-size="10" text-anchor="middle">top-k · threshold</text>
  <text x="355" y="370" fill="#6e7681" font-size="9" text-anchor="middle">metadata filter</text>
  <line x1="410" y1="346" x2="430" y2="346" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="430" y1="346" x2="430" y2="285" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="355" y1="380" x2="355" y2="410" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Generation -->
  <rect x="168" y="410" width="374" height="68" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="355" y="435" fill="#3fb950" font-size="12" font-weight="600" text-anchor="middle">Generation</text>
  <text x="355" y="452" fill="#8b949e" font-size="10" text-anchor="middle">claude-sonnet-4-5 · prompt caching · grounded citations</text>
  <text x="355" y="468" fill="#6e7681" font-size="9" text-anchor="middle">Anthropic SDK (direct, no LangChain)</text>
  <line x1="542" y1="444" x2="564" y2="444" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Answer -->
  <rect x="564" y="410" width="120" height="68" rx="8" fill="#0f2d1a" stroke="#3fb950" stroke-width="1.5"/>
  <text x="624" y="435" fill="#3fb950" font-size="12" font-weight="600" text-anchor="middle">Answer</text>
  <text x="624" y="452" fill="#8b949e" font-size="10" text-anchor="middle">+ Citations</text>
  <text x="624" y="468" fill="#6e7681" font-size="9" text-anchor="middle">Answer model</text>

  <!-- Eval -->
  <rect x="420" y="312" width="264" height="50" rx="8" fill="#1a1208" stroke="#d29922" stroke-width="1.5"/>
  <text x="552" y="333" fill="#d29922" font-size="11" font-weight="600" text-anchor="middle">Evaluation (RAGAS)</text>
  <text x="552" y="350" fill="#8b949e" font-size="9" text-anchor="middle">Faithfulness · Relevancy · Precision · Recall</text>

  <!-- Config -->
  <rect x="420" y="60" width="264" height="68" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="552" y="85" fill="#8b949e" font-size="12" font-weight="600" text-anchor="middle">Config</text>
  <text x="552" y="102" fill="#6e7681" font-size="10" text-anchor="middle">pydantic-settings · .env</text>
  <text x="552" y="118" fill="#6e7681" font-size="9" text-anchor="middle">EMBEDDER=voyage|local · TOP_K · models</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4d5566"/>
    </marker>
  </defs>

  <!-- Legend -->
  <rect x="36" y="455" width="12" height="12" rx="2" fill="#0f1b2d" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="54" y="466" fill="#6e7681" font-size="10">Vector Store (shared)</text>
  <rect x="160" y="455" width="12" height="12" rx="2" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="178" y="466" fill="#6e7681" font-size="10">Ingest path</text>
  <rect x="264" y="455" width="12" height="12" rx="2" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="282" y="466" fill="#6e7681" font-size="10">Query path</text>
  <rect x="360" y="455" width="12" height="12" rx="2" fill="#1a1208" stroke="#d29922" stroke-width="1.5"/>
  <text x="378" y="466" fill="#6e7681" font-size="10">Evaluation</text>
</svg>
